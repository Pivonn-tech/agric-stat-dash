name: agric_stat_mobile
description: Agricultural Statistics Dashboard - Mobile App for demand forecasting and inventory optimization
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # HTTP and API
  http: ^1.1.0
  dio: ^5.3.0

  # State Management
  provider: ^6.0.0

  # Navigation
  go_router: ^10.0.0

  # Data Serialization
  json_serializable: ^6.7.0
  json_annotation: ^4.8.1

  # Local Storage
  shared_preferences: ^2.2.2
  sqflite: ^2.3.0

  # UI/UX
  flutter_spinkit: ^5.2.0
  intl: ^0.19.0
  fl_chart: ^0.63.0
  cached_network_image: ^3.3.0

  # Utilities
  connectivity_plus: ^5.0.0
  logger: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  json_serializable: ^6.7.0
  build_runner: ^2.4.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
