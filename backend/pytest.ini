[tool:pytest]
# Pytest configuration for agricultural statistics dashboard

testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]

# Set working directory
pythonpath = ["."]

# Override asyncio mode for pytest-asyncio
asyncio_mode = "auto"

# Minimum Python version
minversion = 7.0

# Add options
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# Markers for categorizing tests
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow running tests
    api: API endpoint tests
    service: Service tests
    model: Model tests
